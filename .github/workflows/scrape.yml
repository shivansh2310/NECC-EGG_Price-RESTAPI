name: Daily NECC Data Scrape

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 08:30 IST
  workflow_dispatch:      # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        run: python scraper.py --output necc_egg_prices_daily.csv
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add necc_egg_prices_daily.csv
          git diff --staged --quiet || (git commit -m "Daily data refresh: $(date +'%Y-%m-%d')" && git push)
