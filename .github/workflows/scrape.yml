name: Daily NECC Data Scrape

on:
  schedule:
    # Runs every day at 03:00 UTC (08:30 IST)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: necc-daily-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py --output necc_egg_prices_daily.csv

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add necc_egg_prices_daily.csv

          # Exit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Daily data refresh: $(date +'%Y-%m-%d')"

          # Synchronize with latest remote changes
          git pull --rebase origin main

          # Push back to GitHub
          git push origin HEAD:main
